name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run fast tests (no models required)
        run: pytest tests -v -m "not needs_models"
