[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Disables the `logfire` pytest plugin auto-load. This has nothing to do
# with this project -- it's a third-party observability tool some
# environments have installed globally, whose own dependencies
# (opentelemetry-sdk vs opentelemetry-exporter-otlp-proto-http) can be
# mismatched and crash pytest's plugin loading before it ever reaches
# this project's tests. Disabling it here is environment-defensive, not
# a statement about logfire itself.
addopts = -p no:logfire
markers =
    needs_models: requires real embedding/generation model downloads and network access
